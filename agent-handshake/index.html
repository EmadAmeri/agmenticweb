<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#8FD42E">
    <title>Agmentic Agent Handshake</title>
    <link rel="stylesheet" href="./style.css?v=final-deal-v4">
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="app-shell">
      <main class="layout-grid">
        <section class="hero-stage">
          <header class="app-header">
            <div>
              <p class="eyebrow">Agmentic LAB</p>
              <h1>Agent Handshake</h1>
              <p class="hero-copy">One tap shows two agents connecting and negotiating.</p>
            </div>
            <div class="header-actions">
              <button class="primary-action" id="startLocalNegotiation" type="button">
                <i data-lucide="handshake"></i>
                Connect agents
              </button>
            </div>
          </header>

          <div class="workspace-panel live-panel">
            <div class="compact-status-row">
              <span class="mode-pill" id="modeLabel">Ready</span>
              <span class="status-pill" id="status">Idle</span>
            </div>

            <div class="agent-map">
              <div class="agent-node consumer">
                <i data-lucide="user-round"></i>
                <span>Consumer</span>
              </div>
              <div class="link-line"><span id="pulseDot"></span></div>
              <div class="agent-node retailer">
                <i data-lucide="store"></i>
                <span>Retailer</span>
              </div>
            </div>

            <div class="connected-agents" id="connectedAgents" hidden></div>
            <div class="english-feed hero-chat" id="englishFeed"></div>
          </div>
        </section>

        <section class="details-section">
          <div class="workspace-panel">
            <div class="panel-title">
              <div>
                <h2>Details</h2>
                <p>Everything extra lives below the main handshake view.</p>
              </div>
              <div class="panel-actions">
                <button class="secondary-action" id="loadMaisonDemo" type="button">
                  <i data-lucide="utensils"></i>
                  Load demo
                </button>
                <button class="secondary-action" id="loadAllergyDemo" type="button">
                  <i data-lucide="shield-alert"></i>
                  Allergy demo
                </button>
                <button class="secondary-action legacy-action" id="startLive" type="button">
                  <i data-lucide="radio"></i>
                  Backend demo
                </button>
                <button class="secondary-action" id="generateRetailerOfferDebug" type="button">
                  <i data-lucide="sparkles"></i>
                  Generate offer
                </button>
                <button class="secondary-action" id="evaluateRetailerOfferDebug" type="button">
                  <i data-lucide="check-circle-2"></i>
                  Evaluate offer
                </button>
                <button class="secondary-action" id="clearTimeline" type="button">
                  <i data-lucide="eraser"></i>
                  Clear
                </button>
              </div>
            </div>

            <div class="shared-state-summary" id="sharedStateSummary" aria-live="polite"></div>
            <div class="meal-path-comparison" id="mealPathComparison" hidden></div>
            <div class="final-result-card" id="finalResultCard" hidden></div>
            <div class="timeline" id="timeline"></div>
          </div>

          <div class="workspace-panel protocol-panel">
            <div class="panel-title">
              <div>
                <h2>Protocol Transcript</h2>
                <p>Raw agent-to-agent messages for debugging after the main experience.</p>
              </div>
            </div>
            <pre id="agentLanguage"></pre>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" hidden></div>
    <script src="../shared/agent-protocol.js?v=3"></script>
    <script src="./app-memory-real-v1.js?v=final-deal-v4"></script>
  </body>
</html>
