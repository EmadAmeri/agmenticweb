<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agmentic</title>
    <meta
      name="description"
      content="Temporary welcome page for Agmentic."
    />
    <style>
      :root {
        --bg: #edf4fc;
        --text: #081a37;
        --muted: #35527f;
        --line: rgba(12, 99, 212, 0.14);
        --strong-line: rgba(12, 99, 212, 0.34);
        --shadow: 0 24px 80px rgba(10, 30, 68, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top right, rgba(12, 99, 212, 0.12), transparent 24%),
          radial-gradient(circle at left top, rgba(3, 19, 47, 0.08), transparent 24%),
          linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Avenir Next", "SF Pro Display", "Trebuchet MS", sans-serif;
        text-align: center;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(48, 88, 154, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(48, 88, 154, 0.08) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.6), transparent 90%);
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        right: 8%;
        bottom: 10%;
        width: min(34vw, 360px);
        height: min(34vw, 360px);
        border-radius: 50%;
        background: radial-gradient(circle, rgba(12, 99, 212, 0.14), transparent 68%);
        filter: blur(10px);
        animation: drift 11s ease-in-out infinite;
        pointer-events: none;
      }

      .welcome-shell {
        position: relative;
        width: min(980px, 100%);
        padding: 24px;
        animation: float-in 900ms ease both;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 6vw, 5.6rem);
        line-height: 1;
        letter-spacing: -0.06em;
        font-weight: 800;
      }

      h1 span {
        display: block;
        white-space: nowrap;
      }

      h1 span:first-child {
        font-size: 0.84em;
        letter-spacing: -0.06em;
      }

      h1 span:last-child {
        font-size: 1em;
      }

      .links {
        margin-top: 42px;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 18px;
        align-items: center;
        justify-content: center;
      }

      .footnote {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        color: rgba(8, 26, 55, 0.42);
        font-size: 0.82rem;
        letter-spacing: 0.02em;
        text-transform: lowercase;
      }

      a {
        position: relative;
        color: var(--text);
        text-decoration: none;
        font-size: clamp(1rem, 2.5vw, 1.15rem);
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.64);
        background: rgba(255, 255, 255, 0.42);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        transition:
          transform 180ms ease,
          color 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      a::before {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 7px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--strong-line), transparent);
        pointer-events: none;
      }

      a:hover {
        color: var(--text);
        border-color: var(--strong-line);
        background: rgba(255, 255, 255, 0.6);
        transform: translateY(-1px);
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes drift {
        0%,
        100% {
          transform: translate3d(0, 0, 0);
        }

        50% {
          transform: translate3d(18px, -14px, 0);
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .welcome-shell {
          padding: 12px;
        }

        .links {
          margin-top: 22px;
          gap: 12px;
        }

        a {
          width: 100%;
        }

        .footnote {
          bottom: 14px;
          font-size: 0.76rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="welcome-shell">
      <h1>
        <span>Welcome to</span>
        <span>the Agmentic World</span>
      </h1>

      <div class="links">
        <a href="https://www.linkedin.com/company/agmentic/" target="_blank" rel="noreferrer"
          >LinkedIn</a
        >
        <a href="mailto:hello@agmentic.com">hello@agmentic.com</a>
      </div>
    </main>

    <div class="footnote">powered by agmentic</div>
  </body>
</html>
