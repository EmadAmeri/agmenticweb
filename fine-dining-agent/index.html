<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#8FD42E">
    <title>Dining Agent</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css?v=40">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <h1>Dining</h1>
          <p>your dinner companion</p>
        </div>
        <div class="header-actions">
          <button class="header-action-button camera-button" id="cameraButton" aria-label="Photograph menu" title="Photograph menu">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 6.5 10.4 5h3.2L15 6.5h3.2A2.8 2.8 0 0 1 21 9.3v6.9a2.8 2.8 0 0 1-2.8 2.8H5.8A2.8 2.8 0 0 1 3 16.2V9.3a2.8 2.8 0 0 1 2.8-2.8H9Z"/>
              <circle cx="12" cy="12.6" r="3.4"/>
            </svg>
          </button>
          <button class="header-action-button location-button" id="locationButton" type="button" aria-label="Use location" title="Use location">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21s7-5.7 7-12a7 7 0 0 0-14 0c0 6.3 7 12 7 12Z"/>
              <circle cx="12" cy="9" r="2.4"/>
            </svg>
          </button>
          <button class="provider-toggle" id="providerToggle" type="button" aria-pressed="false">
            <span id="providerLabel">Cloud</span>
          </button>
          <button class="icon-button" id="openProfile" aria-label="Open profile">☰</button>
        </div>
      </header>

      <main>
        <section class="camera-card">
          <input id="menuImage" type="file" accept="image/*" capture="environment" hidden>
          <img class="menu-preview" id="menuPreview" alt="Uploaded menu preview" hidden>
          <div class="ocr-progress" id="ocrProgress" hidden>
            <div class="ocr-progress-bar" id="ocrProgressBar"></div>
          </div>
          <div class="restaurant-list" id="restaurantList" hidden></div>
          <p class="status-text" id="menuStatus"></p>
          <p class="local-status" id="localModelStatus"></p>
        </section>

        <section class="chat-card">
          <div class="conversation" id="conversation" aria-live="polite"></div>
          <form class="chat-form" id="chatForm">
            <input id="chatInput" type="text" placeholder="Ask about the menu..." autocomplete="off">
            <button type="submit">Send</button>
          </form>
        </section>
      </main>

      <div class="bottom-actions">
        <button class="call-button" id="openCall">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8.5 4.5 6.6 5.7c-.8.5-1.1 1.5-.8 2.4a17.5 17.5 0 0 0 10.1 10.1c.9.3 1.9 0 2.4-.8l1.2-1.9c.4-.7.3-1.6-.3-2.2l-1.7-1.7c-.6-.6-1.5-.7-2.2-.3l-1.2.7a10.3 10.3 0 0 1-4.1-4.1l.7-1.2c.4-.7.3-1.6-.3-2.2L8.7 4.8c-.6-.6-1.5-.7-2.2-.3Z"/>
          </svg>
          <span>Call agent</span>
        </button>
        <button class="suggest-button" id="openSuggest">Suggest a meal</button>
      </div>
    </div>

    <aside class="side-panel" id="profilePanel" aria-hidden="true">
      <div class="panel-header">
        <div>
          <h2>Profile</h2>
          <p>what I remember</p>
        </div>
        <button class="icon-button" id="closeProfile" aria-label="Close profile">×</button>
      </div>
      <div class="profile-content" id="profileContent"></div>
      <label class="contact-setting">
        User ID
        <input id="userIdInput" type="text" placeholder="e.g. emad" autocomplete="off">
      </label>
      <button class="secondary-button" id="saveUserId">Switch user</button>
      <label class="contact-setting">
        Agent contact name
        <input id="agentContactName" type="text" value="Dining Agent" autocomplete="off">
      </label>
      <button class="secondary-button" id="saveContactName">Save contact name</button>
      <button class="secondary-button" id="clearMemory">Clear memory</button>
      <button class="secondary-button" id="newSession">New session</button>
    </aside>

    <div class="modal-backdrop" id="suggestModal" hidden>
      <form class="modal" id="suggestForm">
        <h2>Plan the meal</h2>
        <label>
          Occasion
          <input id="occasionInput" type="text" value="casual dinner">
        </label>
        <label>
          Courses
          <input id="coursesInput" type="number" min="1" max="8" value="3">
        </label>
        <div class="modal-actions">
          <button type="button" class="secondary-button" id="closeSuggest">Cancel</button>
          <button type="submit">Suggest</button>
        </div>
      </form>
    </div>

    <div class="loader" id="loader" hidden>
      <span></span>
    </div>

    <section class="call-screen" id="callScreen" hidden aria-hidden="true">
      <div class="call-statusbar" aria-hidden="true">
        <span>9:41</span>
        <span>●●● 5G ▰</span>
      </div>
      <div class="call-top">
        <p id="callRouteLabel">mobile</p>
        <h2 id="callContactName">Dining Agent</h2>
        <span id="callStatus">Incoming call</span>
        <strong id="callTimer">00:00</strong>
        <div class="call-avatar" id="callAvatar">D</div>
        <div class="ring-pulse" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
      <div class="call-spacer" aria-hidden="true"></div>
      <div class="incoming-shortcuts" id="incomingShortcuts">
        <button class="call-mini-control" type="button">Remind Me</button>
        <button class="call-mini-control" type="button">Message</button>
      </div>
      <div class="incoming-controls" id="incomingControls">
        <button class="call-control decline" id="declineCall" type="button"><span>✕</span><small>Decline</small></button>
        <button class="call-control accept" id="acceptCall" type="button"><span>✓</span><small>Accept</small></button>
      </div>
      <div class="call-controls" id="activeCallControls" hidden>
        <button class="call-control secondary" id="muteCall" type="button"><span>mic</span><small>mute</small></button>
        <button class="call-control secondary" id="keypadCall" type="button"><span>•••</span><small>keypad</small></button>
        <button class="call-control secondary" id="speakerCall" type="button"><span>audio</span><small>speaker</small></button>
        <button class="call-control secondary disabled" id="addCall" type="button"><span>＋</span><small>add call</small></button>
        <button class="call-control secondary disabled" id="facetimeCall" type="button"><span>video</span><small>FaceTime</small></button>
        <button class="call-control secondary" id="contactsCall" type="button"><span>person</span><small>contacts</small></button>
        <button class="call-control end" id="endCall" type="button"><span>⌕</span><small>end</small></button>
      </div>
    </section>

    <script src="./app.js?v=40"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js?v=40");
      }
    </script>
  </body>
</html>
