<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agmentic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── DARK ────────────────────────────────────────────────── */
:root {
  --bg:       #0E0E0C;
  --surface:  #1A1A17;
  --hover:    #252522;
  --border:   #3A3A36;

  --h1:       #FFFFFF;
  --h2:       #E8E6DF;
  --h3:       #B8B6AF;
  --body:     #8A8A80;
  --caption:  #6E6E65;

  --brand:       #8FD42E;
  --brand-dim:   rgba(143,212,46,0.5);
  --brand-hover: rgba(163,232,60,1);
  --brand-faint: rgba(143,212,46,0.07);

  --navy: #3b82f6;
  --red:  #f87171;
  --gold: #fbbf24;

  --logo-glow:  drop-shadow(0 0 7px rgba(143,212,46,0.2));
  --amb1:       rgba(143,212,46,0.03);
  --amb2:       rgba(143,212,46,0.008);
  --grain-op:   0.028;
  --divider:    rgba(255,255,255,0.07);
}

/* ── LIGHT ───────────────────────────────────────────────── */
html[data-theme="light"] {
  --bg:       #F5F4F0;
  --surface:  #EFEDE8;
  --hover:    #E6E4DE;
  --border:   #BEBCB6;

  --h1:       #0E0E0C;
  --h2:       #1A1A17;
  --h3:       #2C2C29;
  --body:     #42423F;
  --caption:  #5A5A56;

  --brand:       #4E7A18;
  --brand-dim:   rgba(78,122,24,0.6);
  --brand-hover: rgba(58,96,12,1);
  --brand-faint: rgba(78,122,24,0.08);

  --logo-glow:  drop-shadow(0 0 6px rgba(78,122,24,0.22));
  --amb1:       rgba(78,122,24,0.05);
  --amb2:       rgba(78,122,24,0.012);
  --grain-op:   0.032;
  --divider:    rgba(0,0,0,0.13);
}

html, body { width:100%; height:100%; overflow:hidden; color:var(--h1); }

body {
  display: flex;
  flex-direction: column;
  font-family: 'Inter', sans-serif;
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 50% 110%, var(--amb1) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 85% 8%,  rgba(59,130,246,0.02) 0%, transparent 50%);
  transition: background-color 0.45s, color 0.45s;
}

body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: var(--grain-op); transition: opacity 0.45s;
}

.amb {
  position:fixed; bottom:-160px; left:50%; transform:translateX(-50%);
  width:800px; height:280px; pointer-events:none; z-index:1;
  background: radial-gradient(ellipse at 50% 100%, var(--amb1) 0%, var(--amb2) 32%, transparent 66%);
}

.edge {
  position:fixed; left:0; top:0; bottom:0; width:2px; z-index:10;
  background: linear-gradient(to bottom,
    var(--brand) 0%,  var(--brand) 33%,
    var(--navy)  33%, var(--navy)  55%,
    var(--red)   55%, var(--red)   77%,
    var(--gold)  77%, var(--gold)  100%
  );
}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 28px 60px;
  position: relative; z-index: 2;
}

.logo-wrap { display:flex; align-items:center; gap:11px; }
.logo-img  { width:28px; height:28px; filter:var(--logo-glow); }
.wordmark  {
  font-family:'Inter',sans-serif; font-weight:600;
  font-size:clamp(11px,1.1vw,15px);
  letter-spacing:5px; text-transform:uppercase;
  color:var(--h1); line-height:1; transition:color 0.45s;
}

.social-links { display:flex; gap:18px; align-items:center; }
.social-link  {
  display:flex; align-items:center; gap:6px; text-decoration:none;
  color:var(--caption); font-size:9px; font-weight:500;
  letter-spacing:1.8px; text-transform:uppercase; transition:color 0.3s;
}
.social-link:hover { color:var(--h3); }

.theme-toggle {
  display:flex; align-items:center; justify-content:center;
  width:26px; height:26px; background:none;
  border:1px solid var(--border); border-radius:50%;
  cursor:pointer; color:var(--caption); padding:0;
  transition:color 0.3s, border-color 0.3s, background 0.3s;
}
.theme-toggle:hover { color:var(--h3); border-color:var(--h3); background:var(--hover); }
.icon-sun  { display:none; }
.icon-moon { display:block; }
html[data-theme="light"] .icon-sun  { display:block; }
html[data-theme="light"] .icon-moon { display:none; }

/* ── MAIN ────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative; z-index: 2;
  min-height: 0;
}

/* ── LEFT — statement only ───────────────────────────────── */
.left-half {
  width: 100%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 64px;
  text-align: center;
  transition: width 0.95s cubic-bezier(0.4, 0, 0.2, 1);
}

.main.revealed .left-half { width: 50%; }

/* ── STATEMENT ───────────────────────────────────────────── */
#statement {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  letter-spacing: -0.02em;
  font-size: clamp(26px, 4.6vw, 68px);
  line-height: 1.22;
  color: var(--h1);
  transition: font-size 0.95s cubic-bezier(0.4, 0, 0.2, 1), color 0.45s;
}

.main.revealed #statement {
  font-size: clamp(17px, 2.3vw, 36px);
}

#statement em {
  font-style: normal;
  font-weight: 600;
  color: var(--brand);
  transition: color 0.45s;
}

.cursor {
  display: inline-block;
  width: 2px; height: 0.82em;
  background: var(--brand);
  vertical-align: middle; margin-left: 4px;
  animation: blink 1.1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── RIGHT — shifts + dots ───────────────────────────────── */
.right-half {
  width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 0;
  opacity: 0;
  border-left: 1px solid transparent;
  transition:
    width   0.95s cubic-bezier(0.4, 0, 0.2, 1),
    opacity 0.65s ease 0.35s,
    padding 0.95s cubic-bezier(0.4, 0, 0.2, 1),
    border-color 0.4s ease 0.35s;
}

.main.revealed .right-half {
  width: 50%;
  opacity: 1;
  padding: 0 56px 0 56px;
  border-left-color: var(--divider);
}

/* clip the divider line so it has equal breathing room at top and bottom */
.right-half {
  margin-top: 28px;
  margin-bottom: 28px;
}

/* shifts take remaining vertical space */
.shifts-area {
  flex: 1;
  display: flex;
  align-items: center;
}

.shifts-list {
  display: flex;
  flex-direction: column;
  gap: 40px;
  white-space: nowrap;
}

.shift-item {
  opacity: 0;
  transform: translateX(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.shift-item.visible { opacity: 1; transform: none; }

.shift-name {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  font-size: clamp(14px, 1.3vw, 19px);
  color: var(--h2);
  margin-bottom: 5px;
  min-height: 1em;
  transition: color 1.1s ease;
}
.shift-name.typing { color: var(--brand); }

.shift-desc {
  font-family: 'Inter', sans-serif;
  font-weight: 450;
  font-size: clamp(13px, 0.95vw, 15px);
  color: var(--body);
  line-height: 2.0;
  min-height: 1em;
}

/* ── DOTS SECTION (bottom of right column) ───────────────── */
.dots-section {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 0 96px;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.dots-section.visible { opacity: 1; }

.dot-item {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 9px;
  width: 160px;
  flex-shrink: 0;
  cursor: default;
  position: relative;
}

/* ── SIGNAL MARK ─────────────────────────────────────────── */
.signal-mark {
  width: 7px;
  height: 7px;
  border-radius: 2px;
  flex-shrink: 0;
  transition: transform 0.35s ease, opacity 0.35s ease;
}
.dot-item:hover .signal-mark { transform: scale(1.5); opacity: 0.85; }

.dot-denkfabrik .signal-mark { background: var(--navy);  box-shadow: 0 0 8px rgba(59,130,246,0.6); }
.dot-lab        .signal-mark { background: var(--red);   box-shadow: 0 0 8px rgba(248,113,113,0.6); }
.dot-solution   .signal-mark { background: var(--gold);  box-shadow: 0 0 8px rgba(251,191,36,0.6); }

/* dot label */
.dot-name {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: clamp(11px, 0.9vw, 14px);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--caption);
  white-space: nowrap;
  transition: color 0.3s;
}
.dot-item:hover .dot-name { color: var(--h3); }

/* ── LIGHT MODE OVERRIDES ────────────────────────────────── */
html[data-theme="light"] .dot-denkfabrik .signal-mark { box-shadow: 0 0 5px rgba(59,130,246,0.35); }
html[data-theme="light"] .dot-lab        .signal-mark { background: #dc3c3c; box-shadow: 0 0 5px rgba(220,60,60,0.35); }
html[data-theme="light"] .dot-solution   .signal-mark { background: #c89400; box-shadow: 0 0 5px rgba(200,148,0,0.35); }

html[data-theme="light"] body {
  background-image:
    radial-gradient(ellipse 60% 50% at 50% 110%, var(--amb1) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 85% 8%,  rgba(78,122,24,0.03) 0%, transparent 50%);
}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 768px) {
  html, body { overflow: auto; height: auto; }
  .topbar { padding: 20px 24px; }
  .main { flex-direction: column; }
  .left-half,
  .main.revealed .left-half { width: 100%; padding: 28px 24px 16px; min-height: 44vh; }
  #statement,
  .main.revealed #statement { font-size: clamp(22px, 7vw, 36px); }
  .right-half,
  .main.revealed .right-half {
    width: 100%; padding: 20px 24px 24px;
    border-left: none; border-top: 1px solid var(--divider);
    flex-direction: column;
  }
  .shifts-list { white-space: normal; }
  .dots-section { gap: 18px; flex-wrap: wrap; padding: 16px 0 0; }
  .amb { width: 100%; }
}
</style>
</head>
<body>

<div class="amb"></div>
<div class="edge"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo-wrap">
    <img class="logo-img" src="assets/agmentic-logo.png" alt="Agmentic">
    <div class="wordmark">Agmentic</div>
  </div>
  <div class="social-links">
    <a class="social-link" href="mailto:hello@agmentic.com">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
      </svg>
      <span>hello@agmentic.com</span>
    </a>
    <a class="social-link" href="https://linkedin.com" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/>
        <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
      </svg>
      <span>LinkedIn</span>
    </a>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark">
      <svg class="icon-moon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- LEFT: statement -->
  <div class="left-half">
    <p id="statement"></p>
  </div>

  <!-- RIGHT: shifts + dots below -->
  <div class="right-half" id="right-half">

    <div class="shifts-area">
      <div class="shifts-list" id="shifts-list"></div>
    </div>

    <div class="dots-section" id="dots-section">

      <div class="dot-item dot-denkfabrik">
        <div class="signal-mark"></div>
        <div class="dot-name">Denkfabrik</div>
      </div>

      <div class="dot-item dot-lab">
        <div class="signal-mark"></div>
        <div class="dot-name">Lab</div>
      </div>

      <div class="dot-item dot-solution">
        <div class="signal-mark"></div>
        <div class="dot-name">Solution</div>
      </div>

    </div>
  </div>

</div>

<script>
  (function() {
    const saved = localStorage.getItem('agmentic-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  })();
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('agmentic-theme', next);
  }

  // ── SEQUENCE ──────────────────────────────────────────────
  const stLines = [
    { text: 'Something in AI is shifting right now.',                        em: false },
    { text: 'The kind of shift most companies will understand too late.',    em: false },
    { text: 'We don\u2019t wait for the obvious.',                           em: false },
    { text: 'Neither do you.',                                               em: true  }
  ];

  const shifts = [
    { name: 'Agent',   desc: 'You\u2019ve felt it. A system that moves before you finish the thought. That\u2019s the shift.' },
    { name: 'Browser', desc: 'The screen stays. Everything about how intelligence reaches you through it is changing.' },
    { name: 'Brain',   desc: 'Most data knows what it is. The question is whether it knows what it means.' }
  ];

  const stEl       = document.getElementById('statement');
  const mainEl     = document.getElementById('main');
  const shiftsList = document.getElementById('shifts-list');
  const dotsSec    = document.getElementById('dots-section');

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function typeInto(el, text, min = 38, rand = 24) {
    for (const ch of text) {
      el.textContent += ch;
      await sleep(min + Math.random() * rand);
    }
  }

  async function run() {
    await sleep(600);

    // Phase 1 — type statement
    for (let i = 0; i < stLines.length; i++) {
      if (i > 0) {
        stEl.appendChild(document.createElement('br'));
        await sleep(420);
      }
      const span = document.createElement(stLines[i].em ? 'em' : 'span');
      stEl.appendChild(span);
      await typeInto(span, stLines[i].text, 38, 24);
      if (i < stLines.length - 1) await sleep(340);
    }
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    stEl.appendChild(cursor);

    await sleep(900);

    // Phase 2 — slide left
    mainEl.classList.add('revealed');
    await sleep(1150);

    // Phase 3 — type shifts on right
    for (let i = 0; i < shifts.length; i++) {
      if (i > 0) await sleep(360);
      const item = document.createElement('div');
      item.className = 'shift-item';
      const nameEl = document.createElement('div');
      nameEl.className = 'shift-name';
      const descEl = document.createElement('div');
      descEl.className = 'shift-desc';
      item.appendChild(nameEl);
      item.appendChild(descEl);
      shiftsList.appendChild(item);
      requestAnimationFrame(() => requestAnimationFrame(() => item.classList.add('visible')));
      nameEl.classList.add('typing');
      await typeInto(nameEl, shifts[i].name, 55, 22);
      await sleep(160);
      await typeInto(descEl, shifts[i].desc, 28, 16);
      await sleep(300);
      nameEl.classList.remove('typing');
    }

    await sleep(400);

    // Phase 4 — reveal dots (bottom of right column)
    dotsSec.classList.add('visible');
  }

  run();
</script>
</body>
</html>
